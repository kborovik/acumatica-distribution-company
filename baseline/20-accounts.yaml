# Chart of accounts (GL202500) via the Default endpoint - distribution
# pitch depth for LAB5 Distribution: cash/AR/AP, inventory asset + PO
# accrual, sales + freight revenue, COGS + freight expense + inventory
# adjust, plus retained earnings (32000) and YTD net income (33000) that
# 50-gl-preferences.yaml references. Server-derived fields
# (ChartOfAccountsOrder, CashAccount) are omitted deliberately: the
# server keeps its own derivation, so a sourced value diffs dirty
# forever.
#
# APPLY ORDER (dir expansion sorts *.yaml alphabetically; numbered
# prefixes encode order): this file must apply before
# 50-gl-preferences.yaml, which references accounts 32000 and 33000.
entity: Account
key: AccountCD
