# Units of measure (CS203500) via the Default endpoint - EA for stock
# items; BOX second unit; PIECE/HOUR retained from scaffold.
entity: UnitsOfMeasure
key: UnitID
records:
- UnitID: EA
  Description: Each
  L3Code: EA
- UnitID: BOX
  Description: Box
  L3Code: EA
- UnitID: PIECE
  Description: Piece
  L3Code: PCB
- UnitID: HOUR
  Description: Hour
  L3Code: HUR
