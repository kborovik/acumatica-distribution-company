# Purchased-part stock items (IN202500) via the Default endpoint. The 9
# components the gateway kits assemble from (see README). ItemClass PARTS
# supplies valuation (Average), BaseUOM (EA), posting (inventory 12100)
# and the availability rule - records stay minimal so class changes
# propagate. No DefaultPrice: parts are purchased, not sold; unit costs
# live in the scenario's PO lines. AverageCost/LastCost are
# transaction-derived - never claimed (B11 class).
#
# DefaultWarehouseID WH01 explicit: items created before the class
# carried it keep their creation-time default (MAIN, the transit
# warehouse - PO lines then fail, P5 probe); explicit beats derived.
#
# APPLY ORDER (dir expansion sorts *.yaml alphabetically; numbered
# prefixes encode order): after 54-item-classes.yaml; before
# 85-kit-specifications.yaml, whose components reference these items.
entity: StockItem
key: InventoryID
records:
- InventoryID: ENCL-STD
  Description: Standard enclosure
  ItemClass: PARTS
  ItemStatus: Active
  DefaultWarehouseID: WH01
- InventoryID: ENCL-DIN
  Description: DIN-rail enclosure
  ItemClass: PARTS
  ItemStatus: Active
  DefaultWarehouseID: WH01
- InventoryID: MB-CM4
  Description: Gateway mainboard
  ItemClass: PARTS
  ItemStatus: Active
  DefaultWarehouseID: WH01
- InventoryID: MOD-LTE
  Description: LTE modem module
  ItemClass: PARTS
  ItemStatus: Active
  DefaultWarehouseID: WH01
- InventoryID: ANT-LORA
  Description: LoRa antenna
  ItemClass: PARTS
  ItemStatus: Active
  DefaultWarehouseID: WH01
- InventoryID: ANT-LTE
  Description: LTE antenna
  ItemClass: PARTS
  ItemStatus: Active
  DefaultWarehouseID: WH01
- InventoryID: PSU-12V
  Description: 12V power supply
  ItemClass: PARTS
  ItemStatus: Active
  DefaultWarehouseID: WH01
- InventoryID: SD-32GB
  Description: 32GB industrial SD card
  ItemClass: PARTS
  ItemStatus: Active
  DefaultWarehouseID: WH01
- InventoryID: CBL-PWR
  Description: Power cable
  ItemClass: PARTS
  ItemStatus: Active
  DefaultWarehouseID: WH01
