# discount default from customer class B2B (71-customer-classes.yaml) -
# records stay minimal so class changes propagate. The nested
# MainContact/Address/Country mirrors the vendor finding (T65).
#
# APPLY ORDER (dir expansion sorts *.yaml alphabetically; numbered
# prefixes encode order): after 71-customer-classes.yaml.
