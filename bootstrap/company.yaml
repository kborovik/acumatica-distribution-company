# Company (CS101500) via the custom Bootstrap endpoint (symbolic
# endpoint: bootstrap resolves to the active package version - V20).
# Built-in endpoints cannot create the first organization on a virgin
# tenant. List values are the EXTERNAL labels ('Without Branches', not
# the DAC's 'WithoutBranches'); CountryID feeds the org's Main Address
# - required on first save.
entity: Company
key: AcctCD
endpoint: bootstrap
records:
- AcctCD: LAB5
  AcctName: LAB5 Distribution
  OrganizationType: Without Branches
  BaseCuryID: USD
  CountryID: US
